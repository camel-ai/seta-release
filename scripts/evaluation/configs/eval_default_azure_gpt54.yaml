# Azure GPT-5.4 evaluation config.
#
# Usage:
#   export AZURE_OPENAI_API_KEY="..."
#   export AZURE_OPENAI_BASE_URL="https://....cognitiveservices.azure.com/"
#   export AZURE_API_VERSION="2024-12-01-preview"
#   python scripts/evaluation/eval.py --config scripts/evaluation/configs/eval_default_azure_gpt54.yaml
#
# NOTE: TITO is disabled — Azure handles prompt caching server-side,
# so TITO provides no additional caching benefit. See:
#   seta_env/agent/tests/azure_cache_findings.md

# ═══ TerminalEnv config ═══
terminal_env:
  model:
    model_platform: azure
    model_type: gpt-5.4
    # api_key, url, api_version read from env vars:
    #   AZURE_OPENAI_API_KEY, AZURE_OPENAI_BASE_URL, AZURE_API_VERSION
    model_config_dict:
      # GPT-5.4 requires max_completion_tokens instead of max_tokens
      max_completion_tokens: 4096
      stream: false
      temperature: 1.0

  agent:
    agent: train_agent
    prompt: sys_prompt_base
    max_total_tokens: 28672
    max_completion_tokens: 4096
    max_iteration: 200
    tool_names:
      - shell_exec
      - shell_view
      - shell_wait
      - shell_write_to_process
      - shell_kill_process
      - shell_write_content_to_file
    thinking: true

  runtime:
    env_type: docker
    trial_root: ""
    toolkit: docker

  env:
    reward_fn: pass_ratio
    task_timeouts:
      _reset_env: 300.0
      _reset_agent: 120.0
      agent_astep: 900.0
      _evaluate_completion_sync: 600.0
      _cleanup: null

# ═══ Eval-loop settings ═══
n_trajs: 1
workers: 8
seed: 42

dataset: seta-env-v2
output_dir: outputs/eval
experiment_name: eval_azure_gpt54
trial_name: ""
rank: 0
world_size: 1
