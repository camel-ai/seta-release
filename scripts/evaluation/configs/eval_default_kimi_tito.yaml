# Kimi TITO evaluation config.
#
# Usage:
#   python scripts/evaluation/eval.py --config scripts/evaluation/configs/eval_default_kimi_tito.yaml
#
# Set MOONSHOT_API_KEY in env var before running this config.

# ═══ TerminalEnv config ═══
terminal_env:
  model:
    model_platform: moonshot
    model_type: kimi-k2.5
    api_key: ${oc.env:MOONSHOT_API_KEY}
    url: https://api.moonshot.ai/v1
    tito_enabled: true
    tito_validate: true  # set false after validation
    model_config_dict:
      max_tokens: 4096
      stream: false
      temperature: 1.0

  agent:
    agent: tito_train_agent
    prompt: sys_prompt_base
    max_total_tokens: 28672
    max_completion_tokens: 4096
    max_iteration: 200
    tool_names:
      - shell_exec
      - shell_view
      - shell_wait
      - shell_write_to_process
      - shell_kill_process
      - shell_write_content_to_file
    thinking: true

  runtime:
    env_type: docker
    trial_root: ""
    toolkit: docker

  env:
    reward_fn: pass_ratio
    task_timeouts:
      _reset_env: 300.0
      _reset_agent: 120.0
      agent_astep: 900.0
      _evaluate_completion_sync: 600.0
      _cleanup: null

# ═══ Eval-loop settings ═══
n_trajs: 1
workers: 8
seed: 42

dataset: seta-env-v2
output_dir: outputs/eval
experiment_name: eval_tito
trial_name: ""
rank: 0
world_size: 1
