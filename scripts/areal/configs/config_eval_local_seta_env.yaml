experiment_name: terminal_agent-eval
trial_name: eval_date0413_trial0-qwen-base_tbench_2_0_wo_agent



seed: 1
total_train_epochs: 1      # number of passes over the eval dataset
tokenizer_path: ${actor.path}
enable_offload: false

# ── Eval-specific ─────────────────────────────────────────────────────────────
n_trajs: 16                  # trajectories per task (increase for pass@k eval)

# ── seta-env TerminalEnv config ───────────────────────────────────────────────
terminal_env:
  model: null               # AReaL builds models externally via ArealOpenAI

  agent:
    agent: train_agent
    prompt: sys_prompt_base
    max_total_tokens: 28672
    max_completion_tokens: 4096
    max_iteration: 30
    tool_names:
      - shell_exec
      - shell_view
      - shell_wait
      - shell_write_to_process
      - shell_kill_process
      - shell_write_content_to_file
    thinking: false

  runtime:
    env_type: docker
    toolkit: docker             # "auto" | "tmux" | "docker"
    trial_root: ""            # auto-set by eval/train scripts

  env:
    reward_fn: pass_ratio
    task_timeouts:
      _reset_env: 300.0
      _reset_agent: 120.0
      agent_astep: 900.0
      _evaluate_completion_sync: 600.0
      _cleanup: null

# ── AReaL infrastructure ─────────────────────────────────────────────────────
cluster:
  n_nodes: 1
  n_gpus_per_node: 8
  fileroot: outputs/areal/experiments
  name_resolve:
    type: nfs
    nfs_record_root: outputs/areal/name_resolve

allocation_mode: sglang:d8p1t1+eval

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 8
  queue_size: 32
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 100
  enable_rollout_tracing: true
  check_trajectory_format: true

gconfig:
  n_samples: 1
  min_new_tokens: 0
  max_new_tokens: 4096
  greedy: true
  temperature: 1.0

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  dtype: bfloat16

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-8B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: false
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 32768
  optimizer: null

sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 32768
  mem_fraction_static: 0.8
  disable_radix_cache: false

train_dataset:
  batch_size: 8
  shuffle: false
  pin_memory: true
  num_workers: 4
  path: dataset/Anonymous_Submission_Release/SETA_Synth
  type: rl
  max_length: 1024

valid_dataset:
  batch_size: 8
  shuffle: false
  pin_memory: true
  num_workers: 4
  path: dataset/Anonymous_Submission_Release/SETA_Synth
  type: rl

saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  # wandb:
  #   mode: online  # 'online', 'offline', 'shared', 'disabled', 'dryrun' or 'run'
  tensorboard:
    path: ${cluster.fileroot}/${experiment_name}/${trial_name}/tensorboard

launcher:
  inference_server_cpus_per_gpu: 4
  inference_server_mem_per_gpu: 32768
  trainer_cpus_per_gpu: 4
  trainer_mem_per_gpu: 32768

perf_tracer:
  enabled: true
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  save_interval: 1
  session_tracer:
    enabled: true
    flush_threshold: 0
