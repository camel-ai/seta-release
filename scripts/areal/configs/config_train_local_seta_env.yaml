experiment_name: terminal_agent-train-seta-env-v2-full-pass-bonus
trial_name: train_date-0416-seta-v2-filtered-2500-plus-v1-easy-try6

seed: 42
total_train_epochs: 40
tokenizer_path: ${actor.path}
async_training: true
enable_offload: false

# ── Eval-specific ─────────────────────────────────────────────────────────────
n_trajs: 16
filter_uniform_reward: true

cluster:
  n_nodes: 1
  n_gpus_per_node: 8
  fileroot: outputs/areal/experiments
  name_resolve:
    type: nfs
    nfs_record_root: outputs/areal/name_resolve
allocation_mode: sglang:d4p1t1+fsdp:c2t2

# ── seta-env TerminalEnv config ───────────────────────────────────────────────
terminal_env:
  model: null               # AReaL builds models externally via ArealOpenAI

  agent:
    agent: train_agent
    prompt: sys_prompt_base
    max_total_tokens: 28672
    max_completion_tokens: 4096
    max_iteration: 30
    tool_names:
      - shell_exec
      - shell_view
      - shell_wait
      - shell_write_to_process
      - shell_kill_process
      - shell_write_content_to_file
    thinking: false

  runtime:
    env_type: docker
    trial_root: ""            # auto-set by eval/train scripts

  env:
    reward_fn: pass_ratio_with_bonus   # +0.5 bonus when all unit tests pass
    task_timeouts:
      _reset_env: 300.0
      _reset_agent: 120.0
      agent_astep: 900.0
      _evaluate_completion_sync: 600.0
      _cleanup: null

# ── AReaL infrastructure ─────────────────────────────────────────────────────
rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 8
  queue_size: 32
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: true
  check_trajectory_format: true

gconfig:
  n_samples: 1
  min_new_tokens: 0
  max_new_tokens: 10240
  greedy: false
  temperature: 1.0

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-8B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: false
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 32768
  optimizer:
    type: adam
    lr: 1.70e-5
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  # backend: fsdp
  group_size: 1
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behav_imp_weight_cap: 5.0
  dynamic_sampling: false
  adv_norm:
    mean_level: batch
    std_level: batch
  max_new_tokens: ${gconfig.max_new_tokens}

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 32768
  optimizer: null
  # backend: fsdp

# SGLang
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 32768
  mem_fraction_static: 0.8
  disable_radix_cache: true

# datasets
train_dataset:
  batch_size: 8
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: dataset/Anonymous_Submission_Release/SETA_Synth
  type: rl
  max_length: 1024

valid_dataset:
  batch_size: 8
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: dataset/Anonymous_Submission_Release/SETA_Synth
  type: rl

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 50
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: online  # 'online', 'offline', 'shared', 'disabled', 'dryrun' or 'run'
  tensorboard:
    path: ${cluster.fileroot}/${experiment_name}/${trial_name}/tensorboard

launcher:
  inference_server_cpus_per_gpu: 4
  inference_server_mem_per_gpu: 32768
  trainer_cpus_per_gpu: 4
  trainer_mem_per_gpu: 32768

perf_tracer:
  enabled: true
  experiment_name: ${experiment_name}  # Reuse top-level metadata
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}        # Shared filesystem path
  save_interval: 1                     # Write traces every step
  session_tracer:
    enabled: true                      # Track per-session lifecycle
    flush_threshold: 0               # Buffer 100 sessions before flushing
